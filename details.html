<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Full Profile | MediSens</title>
    <link rel="stylesheet" href="template.css">
</head>
<body>
    <div class="form-container">
        <div class="button-group" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="window.location.href='templates.html'">← Back</button>
            <button id="editBtn" onclick="toggleEdit()">Edit Record</button>
            <button id="deleteBtn" style="background-color: #e53e3e; color: white;">Delete Record</button>
        </div>
        <h2 id="fullNameTitle">Patient Profile</h2>
        <hr>
        <div id="fullDetails"></div>
        <form id="editForm" style="display: none;">
            <h3>Edit Patient Information</h3>
            
            <label>First Name</label>
            <input type="text" id="editFN" required>
            
            <label>Middle Name</label>
            <input type="text" id="editMN" required>
            
            <label>Last Name</label>
            <input type="text" id="editLN" required>
            
            <label>Age</label>
            <input type="number" id="editAge" required>

            <label>Address</label>
            <input type="text" id="editAddress" required>

            <label>Contact Number</label>
            <input type="tel" id="editContact" placeholder="09XX-XXX-XXXX">

            <label>Blood Type</label>
            <select id="editBlood">
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>

            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button type="submit" style="background-color: #38a169; color: white;">Save Changes</button>
                <button type="button" onclick="toggleEdit()">Cancel</button>
            </div>
        </form>
    </div>

    <script type="module" src="details.js"></script>
</body>
</html>
