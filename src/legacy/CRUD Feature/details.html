<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Full Profile | MediSens</title>
    <link rel="stylesheet" href="template.css">
</head>

<body>

    <div class="form-container">
        <div class="button-group" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="window.location.href='templates.html'">← Back</button>
            <button id="editBtn" onclick="toggleEdit()">Edit Record</button>
            <button id="deleteBtn" style="background-color: #e53e3e; color: white;">Delete Record</button>
        </div>

        <h2 id="fullNameTitle">Patient Profile</h2>
        <hr>

        <div id="fullDetails">
        </div>

        <form id="editForm" style="display: none;">
            <h3>Edit Patient Information</h3>

            <div class="input-group">
                <label>First Name</label>
                <input type="text" id="editFN" required>
            </div>

            <div class="input-group">
                <label>Middle Name</label>
                <input type="text" id="editMN" required>
            </div>

            <div class="input-group">
                <label>Last Name</label>
                <input type="text" id="editLN" required>
            </div>

            <div class="input-group">
                <label>Age</label>
                <input type="number" id="editAge" required>
            </div>

            <div class="input-group">
                <label>Address</label>
                <input type="text" id="editAddress" required>
            </div>

            <div class="input-group">
                <label>Contact Number</label>
                <input type="tel" id="editContact" placeholder="09XX-XXX-XXXX">
            </div>

            <div class="input-group">
                <label>Nationality</label>
                <input type="text" id="editNationality" placeholder="e.g. Filipino">
            </div>

            <div class="input-group">
                <label>Sex</label>
                <div class="radio-group">
                    <input type="radio" name="sex" value="Male" id="male" required> Male
                    <input type="radio" name="sex" value="Female" id="female" required> Female
                </div>
            </div>

            <div class="input-group">
                <label>Blood Type</label>
                <select id="editBlood">
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>

            <div class="input-group">
                <label>Religion</label>
                <input type="text" id="editReligion" placeholder="Religion">
            </div>

            <div class="input-group">
                <label>Birthday</label>
                <input type="date" id="editBirthday">
            </div>

            <div class="input-group">
                <label>Birth Place</label>
                <input type="text" id="editBirthPlace" placeholder="Birth Place">
            </div>

            <div class="input-group">
                <label>Educational Attainment</label>
                <input type="text" id="editEducationalAttain" placeholder="Educational Attainment">
            </div>

            <div class="input-group">
                <label>Employment Status</label>
                <input type="text" id="editEmploymentStatus" placeholder="Employment Status">
            </div>

            <hr>
            <h4>Emergency Contact Information</h4>

            <div class="input-group">
                <label>Relative's Name</label>
                <input type="text" id="editRelativeName" placeholder="Relative's Name">
            </div>

            <div class="input-group">
                <label>Relative Relationship</label>
                <input type="text" id="editRelativeRelation" placeholder="Relative Relationship">
            </div>

            <div class="input-group">
                <label>Relative Address</label>
                <input type="text" id="editRelativeAddress" placeholder="Relative Address">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">Save Changes</button>
                <button type="button" class="btn-cancel" onclick="toggleEdit()">Cancel</button>
            </div>
        </form>
    </div>

    <script src="details.js"></script>
</body>

</html>
