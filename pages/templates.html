<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediSens | Patient Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:        #2563EB;
            --blue-light:  #EFF6FF;
            --blue-mid:    #1D4ED8;
            --bg:          #F1F5F9;
            --surface:     #FFFFFF;
            --border:      #E2E8F0;
            --text:        #0F172A;
            --text-2:      #475569;
            --text-3:      #94A3B8;
            --red:         #EF4444;
            --green:       #22C55E;
            --radius:      12px;
            --radius-lg:   16px;
            --shadow:      0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Topbar ── */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .topbar-brand {
            display: flex; align-items: center; gap: 10px;
            font-size: 1rem; font-weight: 800; color: var(--text);
        }
        .topbar-brand-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
        }
        .topbar-right { display: flex; align-items: center; gap: 14px; }
        .topbar-email { font-size: 0.82rem; color: var(--text-2); font-weight: 500; }
        .logout-btn {
            background: #FEF2F2;
            color: var(--red);
            border: 1px solid #FECACA;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .logout-btn:hover { background: #FEE2E2; }

        /* ── Page layout ── */
        .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px; display: grid; grid-template-columns: 1fr 380px; gap: 24px; align-items: start; }
        @media (max-width: 900px) { .page { grid-template-columns: 1fr; } }

        .page-header { grid-column: 1 / -1; margin-bottom: 4px; }
        .page-header h1 { font-size: 1.5rem; font-weight: 800; color: var(--text); }
        .page-header p  { font-size: 0.875rem; color: var(--text-2); margin-top: 4px; }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .card-header {
            display: flex; align-items: center; gap: 12px;
            padding: 18px 24px;
            background: var(--blue-light);
            border-bottom: 1px solid #DBEAFE;
        }
        .card-header-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--blue);
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .card-header-title {
            font-size: 0.95rem; font-weight: 700; color: var(--blue);
        }
        .card-body { padding: 24px; }

        /* ── Form grid ── */
        .form-grid { display: grid; gap: 16px; }
        .cols-4 { grid-template-columns: repeat(4, 1fr); }
        .cols-3 { grid-template-columns: repeat(3, 1fr); }
        .cols-2 { grid-template-columns: 1fr 1fr; }
        .col-span-2 { grid-column: span 2; }
        .col-span-3 { grid-column: span 3; }
        .col-span-4 { grid-column: span 4; }
        @media (max-width: 700px) {
            .cols-4, .cols-3, .cols-2 { grid-template-columns: 1fr 1fr; }
            .col-span-3, .col-span-4 { grid-column: span 2; }
        }

        /* ── Field ── */
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label {
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--text-2);
        }
        .field input, .field select, .field textarea {
            padding: 10px 13px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text);
            background: var(--bg);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
            min-height: 42px;
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
            background: var(--surface);
        }
        .field input::placeholder { color: var(--text-3); }

        /* ── Radio group ── */
        .radio-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px; }
        .radio-option {
            display: flex; align-items: center; gap: 7px;
            padding: 8px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem; font-weight: 500;
            color: var(--text-2);
            background: var(--bg);
            transition: all 0.15s;
            user-select: none;
        }
        .radio-option input[type="radio"] { display: none; }
        .radio-option.selected {
            border-color: var(--blue);
            background: var(--blue-light);
            color: var(--blue);
            font-weight: 600;
        }
        .radio-option .radio-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid var(--text-3);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: border-color 0.15s;
        }
        .radio-option.selected .radio-dot {
            border-color: var(--blue);
            background: var(--blue);
        }
        .radio-option.selected .radio-dot::after {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: white;
        }

        /* ── Divider ── */
        .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

        /* ── Save button ── */
        .save-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%;
            padding: 13px 24px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.9rem; font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
            box-shadow: 0 4px 14px rgba(37,99,235,0.35);
            min-height: 48px;
        }
        .save-btn:hover { background: var(--blue-mid); box-shadow: 0 6px 20px rgba(37,99,235,0.45); transform: translateY(-1px); }
        .save-btn:active { transform: scale(0.98); }

        /* ── Patient list (right panel) ── */
        .list-card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; position: sticky; top: 80px; }
        .list-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .list-header-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
        .list-count { background: var(--blue); color: white; border-radius: 20px; padding: 2px 10px; font-size: 0.72rem; font-weight: 700; }
        .search-wrap { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .search-wrap input {
            width: 100%; padding: 9px 12px;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-family: inherit; font-size: 0.85rem; color: var(--text);
            background: var(--bg); outline: none;
            transition: border-color 0.15s;
        }
        .search-wrap input:focus { border-color: var(--blue); background: white; }
        .patient-list { max-height: 500px; overflow-y: auto; }
        .patient-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }
        .patient-row:last-child { border-bottom: none; }
        .patient-row:hover { background: var(--blue-light); }
        .patient-av {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--blue); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem; font-weight: 700; flex-shrink: 0;
        }
        .patient-info { flex: 1; min-width: 0; }
        .patient-name { font-size: 0.85rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .patient-meta { font-size: 0.72rem; color: var(--text-3); margin-top: 2px; }
        .patient-arrow { color: var(--text-3); font-size: 0.9rem; }
        .empty-list { text-align: center; padding: 36px 16px; color: var(--text-3); font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-brand-dot"></div>
            MediSens
        </div>
        <div class="topbar-right">
            <span class="topbar-email" id="userEmail">Loading...</span>
            <button class="logout-btn" id="logoutBtn">Sign Out</button>
        </div>
    </div>

    <div id="root"></div>
    <script type="module" src="../scripts/templates.tsx"></script>
</body>
</html>
