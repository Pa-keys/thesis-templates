<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Patient Records | MediSens</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* CSS Reset & Body Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #F8FAFC; /* Matches Tailwind slate-50 */
            color: #0F172A; 
            min-height: 100vh; 
        }

        /* The Responsive Container */
        .page-container { 
            width: 100%; 
            max-width: 1000px; 
        }

        /* Card Styles */
        .list-card { background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); overflow: hidden; }
        .list-header { display: flex; justify-content: space-between; align-items: center; padding: 24px 32px; border-bottom: 1px solid #E2E8F0; }
        .list-header-title { font-size: 1.4rem; font-weight: 800; }
        .list-count { background: #2563EB; color: #FFFFFF; padding: 4px 14px; border-radius: 20px; font-size: 0.9rem; font-weight: 700; }

        /* Custom Search Bar */
        .search-wrap { padding: 16px 32px; background: #F8FAFC; border-bottom: 1px solid #E2E8F0; }
        .search-wrap input { width: 100%; padding: 14px 16px 14px 44px; border: 1.5px solid #CBD5E1; border-radius: 10px; font-size: 1rem; font-family: inherit; outline: none; transition: all 0.2s; background: #FFFFFF url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="%2364748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>') no-repeat 14px center; }
        .search-wrap input:focus { border-color: #2563EB; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }

        /* Larger Patient Rows */
        .patient-list { max-height: calc(100vh - 250px); overflow-y: auto; }
        .patient-row { display: flex; align-items: center; padding: 20px 32px; border-bottom: 1px solid #E2E8F0; cursor: pointer; transition: all 0.15s; }
        .patient-row:hover { background: #F8FAFC; padding-left: 36px; } 
        .patient-row:last-child { border-bottom: none; }
        .patient-av { width: 52px; height: 52px; border-radius: 50%; background: #2563EB; color: #FFFFFF; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: 800; margin-right: 20px; box-shadow: 0 4px 10px rgba(37,99,235,0.2); }
        .patient-info { flex: 1; }
        .patient-name { font-size: 1.1rem; font-weight: 700; color: #0F172A; margin-bottom: 4px; }
        .patient-meta { font-size: 0.9rem; color: #64748B; font-weight: 500; }
        .patient-arrow { color: #94A3B8; font-size: 1.4rem; font-weight: bold; transition: color 0.2s; }
        .patient-row:hover .patient-arrow { color: #2563EB; }
        .empty-list { padding: 60px 20px; text-align: center; color: #64748B; font-size: 1.1rem; }

        /* Cellphone Compatibility */
        @media (max-width: 600px) {
            .list-header { padding: 20px; }
            .list-header-title { font-size: 1.2rem; }
            .search-wrap { padding: 14px 20px; }
            .patient-row { padding: 16px 20px; }
            .patient-row:hover { padding-left: 20px; } 
            .patient-av { width: 44px; height: 44px; font-size: 1rem; margin-right: 14px; }
            .patient-name { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="module" src="../scripts/records.tsx"></script>
</body>
</html>
