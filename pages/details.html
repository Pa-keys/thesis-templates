<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile | MediSens</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:       #2563EB;
            --blue-light: #EFF6FF;
            --blue-mid:   #1D4ED8;
            --bg:         #F1F5F9;
            --surface:    #FFFFFF;
            --border:     #E2E8F0;
            --text:       #0F172A;
            --text-2:     #475569;
            --text-3:     #94A3B8;
            --red:        #EF4444;
            --green:      #22C55E;
            --orange:     #F59E0B;
            --radius:     12px;
            --radius-lg:  16px;
            --shadow:     0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* ── Topbar ── */
        .topbar {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 0 32px; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            box-shadow: var(--shadow);
        }
        .topbar-brand { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 800; color: var(--text); }
        .topbar-brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
        .topbar-right { display: flex; align-items: center; gap: 10px; }
        .back-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 7px 16px; border-radius: 8px;
            border: 1.5px solid var(--border);
            background: var(--bg); color: var(--text-2);
            font-family: inherit; font-size: 0.82rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s;
        }
        .back-btn:hover { background: var(--surface); color: var(--text); }

        /* ── Page ── */
        .page { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

        /* ── Profile hero ── */
        .profile-hero {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 28px 32px;
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 20px;
        }
        .profile-av {
            width: 64px; height: 64px; border-radius: 50%;
            background: var(--blue); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 800; flex-shrink: 0;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
        }
        .profile-info { flex: 1; }
        .profile-name { font-size: 1.4rem; font-weight: 800; color: var(--text); }
        .profile-meta { font-size: 0.82rem; color: var(--text-3); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
        .profile-meta span { display: flex; align-items: center; gap: 4px; }
        .profile-actions { display: flex; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }

        /* ── Buttons ── */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 9px 18px; border-radius: 8px; border: none;
            font-family: inherit; font-size: 0.83rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s; min-height: 38px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--blue); color: white; box-shadow: 0 3px 10px rgba(37,99,235,0.3); }
        .btn-primary:hover { background: var(--blue-mid); }
        .btn-danger { background: #FEF2F2; color: var(--red); border: 1px solid #FECACA; }
        .btn-danger:hover { background: #FEE2E2; }
        .btn-ghost { background: var(--bg); color: var(--text-2); border: 1.5px solid var(--border); }
        .btn-ghost:hover { background: var(--surface); color: var(--text); }
        .btn-green { background: #F0FDF4; color: #16A34A; border: 1px solid #BBF7D0; }
        .btn-green:hover { background: #DCFCE7; }
        .btn-orange { background: #FFFBEB; color: #D97706; border: 1px solid #FDE68A; }
        .btn-orange:hover { background: #FEF3C7; }

        /* ── Card ── */
        .card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px; }
        .card-header { display: flex; align-items: center; gap: 12px; padding: 16px 24px; background: var(--blue-light); border-bottom: 1px solid #DBEAFE; }
        .card-header-icon { width: 30px; height: 30px; border-radius: 7px; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
        .card-header-title { font-size: 0.9rem; font-weight: 700; color: var(--blue); }
        .card-body { padding: 24px; }

        /* ── Detail grid ── */
        .detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px 24px; }
        @media (max-width: 600px) { .detail-grid { grid-template-columns: 1fr 1fr; } }
        .detail-item .di-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-3); margin-bottom: 3px; }
        .detail-item .di-value { font-size: 0.9rem; font-weight: 600; color: var(--text); }
        .detail-item .di-value.empty { color: var(--text-3); font-weight: 400; font-style: italic; }

        /* ── Edit form ── */
        .form-grid { display: grid; gap: 14px; }
        .cols-3 { grid-template-columns: repeat(3, 1fr); }
        .cols-2 { grid-template-columns: 1fr 1fr; }
        .col-span-2 { grid-column: span 2; }
        .col-span-3 { grid-column: span 3; }
        @media (max-width: 600px) { .cols-3, .cols-2 { grid-template-columns: 1fr 1fr; } .col-span-3 { grid-column: span 2; } }

        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-2); }
        .field input, .field select, .field textarea {
            padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius);
            font-family: inherit; font-size: 0.875rem; color: var(--text);
            background: var(--bg); outline: none; transition: border-color 0.15s, box-shadow 0.15s;
            min-height: 40px;
        }
        .field input:focus, .field select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: var(--surface); }

        /* ── Radio ── */
        .radio-group { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 2px; }
        .radio-option {
            display: flex; align-items: center; gap: 6px;
            padding: 7px 13px; border: 1.5px solid var(--border); border-radius: 8px;
            cursor: pointer; font-size: 0.82rem; font-weight: 500;
            color: var(--text-2); background: var(--bg);
            transition: all 0.15s; user-select: none;
        }
        .radio-option input[type="radio"] { display: none; }
        .radio-option.selected { border-color: var(--blue); background: var(--blue-light); color: var(--blue); font-weight: 600; }
        .radio-dot { width: 13px; height: 13px; border-radius: 50%; border: 2px solid var(--text-3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color 0.15s; }
        .radio-option.selected .radio-dot { border-color: var(--blue); background: var(--blue); }
        .radio-option.selected .radio-dot::after { content: ''; width: 4px; height: 4px; border-radius: 50%; background: white; }

        /* ── Consent button ── */
        .consent-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 13px 24px; background: var(--blue); color: white;
            border: none; border-radius: var(--radius); font-family: inherit;
            font-size: 0.9rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 14px rgba(37,99,235,0.35);
            transition: background 0.15s, transform 0.1s;
        }
        .consent-btn:hover { background: var(--blue-mid); transform: translateY(-1px); }

        /* ── Error ── */
        .error-box { background: #FEF2F2; border: 1px solid #FECACA; color: var(--red); border-radius: var(--radius); padding: 16px 20px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-brand-dot"></div>
            MediSens
        </div>
        <div class="topbar-right">
            <button class="back-btn" onclick="window.location.href='/pages/templates.html'">← Back to Records</button>
        </div>
    </div>

    <div id="root"></div>
    <script type="module" src="../scripts/details.tsx"></script>
</body>
</html>
